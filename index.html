<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>FFBEWG</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app" data-screen="home">
    <div class="screen-shell">
      <header class="top-hud">
        <div class="hud-main">
          <div class="hud-brand" aria-label="FFBEWG 로고">
            <img src="./images/logos/logos-transparent.png" alt="FFBEWG" draggable="false" />
          </div>
          <div class="hud-chip" title="골드: 유닛 성장과 강화에 사용하는 기본 재화입니다.">💰 <span id="goldValue">128,400</span></div>
          <div class="hud-chip" title="다이아: 소환과 주요 보상에 사용하는 프리미엄 재화입니다.">💎 <span id="gemValue">1,240</span></div>
          <div class="hud-chip" title="티켓: 이벤트나 퀘스트 보상으로 얻는 특수 소환권입니다.">🎫 <span id="ticketValue">0</span></div>
          <div class="hud-chip hud-chip--party-power" title="전투력: 현재 편성된 파티의 장비, 성장, 배치, 시너지까지 반영한 종합 전력입니다.">⚡ <span id="partyPowerValue">0</span></div>
          <div class="save-status save-status--idle" id="saveStatus" aria-live="polite" title="서버 저장 상태">
            <span class="save-status__dot"></span>
            <span id="saveStatusText">저장 대기</span>
          </div>
          <button class="admin-menu-btn" id="adminMenuBtn" type="button" hidden>관리자</button>
          <button class="menu-btn" type="button" aria-label="메뉴">☰</button>
        </div>
      </header>

      <main class="screen-main">
        <section class="party-stage" id="partyStage"></section>
        <section class="content-entry" id="contentEntry"></section>
      </main>
    </div>

    <nav class="bottom-nav" aria-label="하단 메뉴">
      <button class="nav-item active" data-screen="home" type="button">
        <span class="nav-icon">⌂</span>
        <span class="nav-label">홈</span>
      </button>
      <button class="nav-item" data-screen="units" type="button">
        <span class="nav-icon">⚔</span>
        <span class="nav-label">유닛</span>
      </button>
      <button class="nav-item" data-screen="collection" type="button">
        <span class="nav-icon">◆</span>
        <span class="nav-label">도감</span>
      </button>
      <button class="nav-item" data-screen="growth" type="button">
        <span class="nav-icon">⬆</span>
        <span class="nav-label">성장</span>
      </button>
      <button class="nav-item" data-screen="summon" type="button">
        <span class="nav-icon">✦</span>
        <span class="nav-label">소환</span>
        <span class="nav-badge">3</span>
      </button>
      <button class="nav-item" data-screen="pvp" type="button">
        <span class="nav-icon">🏆</span>
        <span class="nav-label">PVP</span>
      </button>
    </nav>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
